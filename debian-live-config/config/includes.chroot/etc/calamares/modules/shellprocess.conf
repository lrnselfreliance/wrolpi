---
# Run inside the target system's chroot so paths refer to the installed
# /home/wrolpi, not the live system's.
dontChroot: false
timeout: 30
script:
  # Remove the orphan "Install WROLPi" launcher.  Calamares removes the
  # calamares-settings-debian package (taking the install-debian wrapper
  # binary with it), but the copy we placed in the wrolpi user's Desktop
  # directory is a plain file that apt doesn't track.  Without this
  # cleanup, the installed system shows an icon that fails when clicked
  # because its Exec target no longer exists.
  - "rm -f /home/wrolpi/Desktop/install-wrolpi.desktop"
