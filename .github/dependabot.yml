version: 2
updates:
  # Python - root (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "master"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # Python - controller
  - package-ecosystem: "pip"
    directory: "/controller"
    schedule:
      interval: "monthly"
    target-branch: "master"
    open-pull-requests-limit: 5
    groups:
      controller-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # npm - app
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "monthly"
    target-branch: "master"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
