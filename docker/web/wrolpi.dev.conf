# Nginx config for the WROLPi services.

#
# App
#

location /favicon.ico {
      alias /etc/nginx/favicon.ico;
}

location /apple-touch-icon.png {
  alias /etc/nginx/icon.png;
}

location / {
  # React APP
  proxy_pass http://app:3000;
  rewrite $1 break;
}

location /ws {
  proxy_pass http://app:3000;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
}

#
# Controller API - system management endpoints
# These are handled by the Controller service (port 8087)
#

location /api/health {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_connect_timeout 2s;
  proxy_read_timeout 5s;
}

location /api/status {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_connect_timeout 2s;
  proxy_read_timeout 10s;
}

location /api/services {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/disks {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/hotspot {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/throttle {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/shutdown {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/reboot {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/restart {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

location /api/info {
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

# Controller UI - direct access when main UI is down
location /controller {
  rewrite ^/controller(.*)$ $1 break;
  proxy_pass http://controller:8087;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}

#
# Main API - handled by the API service (port 8081)
#

location /api {
  proxy_pass http://api:8081;
  rewrite /^api(.*)$ $1 break;
}

location /docs {
  proxy_pass http://api:8081;
  rewrite /^docs(.*)$ $1 break;
}

location /media {
  # The media files mounted in the docker volume
  sendfile on;
  sendfile_max_chunk 1m;

  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  autoindex on;
  autoindex_exact_size off;
  alias /opt/media;
}

location /download {
  # Assume any request here is to download a file from the media directory.
  if ( $request_filename ~ '^.*/(.+)$' ) {
    # Always include the filename for downloads.
    add_header Content-Disposition 'attachment; filename="$1"';
  }

  sendfile on;
  sendfile_max_chunk 1m;

  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  autoindex on;
  autoindex_exact_size off;
  alias /opt/media;
}
