# Configuration file for Calamares — WROLPi installer.
#
# Mostly mirrors the upstream calamares-settings-debian settings.conf;
# differences are:
#   - branding: wrolpi  (was: debian)
#   - shellprocess inserted near the end of the exec phase to clean up the
#     "Install WROLPi" desktop launcher we drop on the live user's desktop.
#     Upstream's packages module already removes calamares-settings-debian
#     (taking install-debian and the .desktop file in /usr/share/applications
#     with it), but our copy in /home/wrolpi/Desktop/ is a plain file that
#     apt doesn't know about and would otherwise survive as an orphan on
#     the installed system.
---

modules-search: [ local, /usr/lib/calamares/modules ]

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary

- exec:
  - partition
  - mount
  - unpackfs
  - dpkg-unsafe-io
  - sources-media
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader-config
  - grubcfg
  - bootloader
  - packages
  - luksbootkeyfile
  - plymouthcfg
  - initramfscfg
  - initramfs
  - dpkg-unsafe-io-undo
  - sources-media-unmount
  - sources-final
  - shellprocess
  - umount

- show:
  - finished

branding: wrolpi

prompt-install: false

dont-chroot: false
